##############################################################################
# HPE Morpheus VME Classic — Nginx Site Configuration
# Generated by deploy.sh — edit carefully
##############################################################################

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/morpheus-vme-classic/dist;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # ── Static Assets (long cache) ────────────────────────────────────────────
    location ~* \.(js|css|wasm|woff2?|ttf|ico|png|svg|webp|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Morpheus API Proxy — /api/* ───────────────────────────────────────────
    location /api/ {
        proxy_pass        VME_MANAGER_URL_PLACEHOLDER/api/;
        proxy_set_header  Host              $proxy_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Authorization     $http_authorization;
        proxy_pass_header Authorization;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Strip CORS headers from upstream, let browser handle same-origin
        proxy_hide_header Access-Control-Allow-Origin;
    }

    # ── OAuth Token Proxy — /oauth/* ──────────────────────────────────────────
    location /oauth/ {
        proxy_pass        VME_MANAGER_URL_PLACEHOLDER/oauth/;
        proxy_set_header  Host              $proxy_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }

    # ── SPA Fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
